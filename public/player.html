<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deninho TV Pro Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <!-- libde265 for HEVC software decoding support -->
    <script src="https://cdn.jsdelivr.net/gh/strukturag/libde265.js@master/dist/libde265.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f27d26;
            --bg: #000;
            --text: #fff;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-hover: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #player-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: pointer;
        }

        /* Custom Controls */
        #controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 20;
            pointer-events: auto;
        }

        #player-wrapper.show-controls #controls {
            opacity: 1;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            background: var(--glass);
            transform: scale(1.1);
        }

        .btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Volume Slider */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            group: hover;
        }

        #volume-slider {
            width: 0;
            opacity: 0;
            transition: all 0.3s ease;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .volume-container:hover #volume-slider {
            width: 80px;
            opacity: 1;
        }

        /* Loading Overlay */
        #loading {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            pointer-events: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--glass);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(242, 125, 38, 0.2);
        }

        #loading span {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.6);
            animation: pulse 1.5s infinite;
        }

        /* Back Button */
        #back-btn-top {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 50;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass);
            opacity: 0;
            transition: all 0.3s ease;
        }

        #player-wrapper.show-controls #back-btn-top {
            opacity: 1;
        }

        #back-btn-top:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* Live Badge - Adjusted position */
        #live-badge {
            position: absolute;
            top: 30px;
            left: 90px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            border: 1px solid var(--glass);
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #player-wrapper.show-controls #live-badge {
            opacity: 1;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #ff4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4444;
            animation: blink 1s infinite;
        }

        #live-badge span {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Error Message */
        #error-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 40;
            text-align: center;
            padding: 40px;
        }

        #error-overlay h2 {
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: #ff4444;
            margin-bottom: 10px;
        }

        #error-overlay p {
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            max-width: 300px;
            margin-bottom: 30px;
        }

        .retry-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .retry-btn:hover {
            transform: scale(1.05);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Big Play Button */
        #big-play {
            position: absolute;
            width: 100px;
            height: 100px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(242, 125, 38, 0.4);
            cursor: pointer;
            z-index: 25;
            transition: all 0.3s ease;
        }

        #big-play:hover {
            transform: scale(1.1);
        }

        #big-play svg {
            width: 40px;
            height: 40px;
            fill: white;
            margin-left: 5px;
        }

        /* Quality Menu Styles */
        .quality-option {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            padding: 10px 15px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .quality-option:hover {
            background: var(--glass);
            color: white;
        }

        .quality-option.active {
            color: var(--primary);
            background: rgba(242, 125, 38, 0.1);
        }
    </style>
</head>
<body>
    <div id="player-wrapper" class="show-controls">
        <video id="video" controls autoplay muted playsinline width="100%"></video>

        <!-- Back Button Top -->
        <button class="btn" id="back-btn-top" onclick="exitPlayer()" title="Voltar">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>

        <!-- Debug Console -->
        <div id="debug-console" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace; font-size: 10px; padding: 10px; border-radius: 5px; z-index: 100; max-width: 300px; max-height: 200px; overflow-y: auto; display: none; pointer-events: none; border: 1px solid #0f0;">
            <div style="font-weight: bold; border-bottom: 1px solid #0f0; margin-bottom: 5px;">DEBUG CONSOLE</div>
            <div id="debug-logs"></div>
        </div>

        <!-- Overlays -->
        <div id="loading">
            <div class="spinner"></div>
            <span>Sincronizando Sinal</span>
        </div>

        <div id="live-badge">
            <div class="dot"></div>
            <span>Ao Vivo</span>
        </div>

        <div id="big-play" style="display: none;">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>

        <div id="error-overlay">
            <h2>Sinal Interrompido</h2>
            <p id="error-text">O stream não pôde ser carregado. Verifique sua conexão ou tente outro modo.</p>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                <button class="retry-btn" onclick="location.reload()">Tentar Novamente</button>
                <button class="retry-btn" style="background: #444;" onclick="setEngine('hlsjs')">HLS.js</button>
                <button class="retry-btn" style="background: #444;" onclick="setEngine('shaka')">Shaka (Exo)</button>
                <button class="retry-btn" style="background: #444;" onclick="setEngine('mpegts')">MPEG-TS</button>
                <button class="retry-btn" style="background: #444;" onclick="setEngine('native')">Nativo</button>
            </div>
        </div>

        <!-- Controls -->
        <div id="controls">
            <div class="control-group">
                <button class="btn" id="play-pause">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>

                <button class="btn" id="refresh-btn" title="Recarregar Sinal">
                    <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
                
                <div class="volume-container">
                    <button class="btn" id="mute-btn">
                        <svg id="vol-on" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        <svg id="vol-off" viewBox="0 0 24 24" style="display: none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                    </button>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1">
                </div>
            </div>

            <div class="control-group">
                <!-- Quality Selector -->
                <div id="quality-selector" style="position: relative; display: none;">
                    <button class="btn" id="quality-btn" title="Qualidade">
                        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                    </button>
                    <div id="quality-menu" style="position: absolute; bottom: 100%; right: 0; background: rgba(20,20,20,0.95); border: 1px solid var(--glass); border-radius: 12px; padding: 10px; display: none; flex-direction: column; min-width: 120px; margin-bottom: 15px; backdrop-filter: blur(20px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                        <!-- Options will be injected here -->
                    </div>
                </div>

                <button class="btn" id="fs-btn">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>

                <button class="btn" id="external-player-btn" title="Player Externo" onclick="openExternalPlayer()">
                    <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const wrapper = document.getElementById('player-wrapper');
        const loading = document.getElementById('loading');
        const errorOverlay = document.getElementById('error-overlay');
        const errorText = document.getElementById('error-text');
        const playPauseBtn = document.getElementById('play-pause');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const bigPlay = document.getElementById('big-play');
        const muteBtn = document.getElementById('mute-btn');
        const volOn = document.getElementById('vol-on');
        const volOff = document.getElementById('vol-off');
        const volSlider = document.getElementById('volume-slider');
        const fsBtn = document.getElementById('fs-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        const qualitySelector = document.getElementById('quality-selector');
        const qualityBtn = document.getElementById('quality-btn');
        const qualityMenu = document.getElementById('quality-menu');
        const debugLogs = document.getElementById('debug-logs');
        const debugConsole = document.getElementById('debug-console');

        const urlParams = new URLSearchParams(window.location.search);
        const streamUrl = urlParams.get('url');
        const debugMode = urlParams.get('debug') === 'true';
        let currentEngine = urlParams.get('engine') || 'hlsjs'; // 'hlsjs' or 'native'

        if (debugMode) debugConsole.style.display = 'block';

        function log(msg, type = 'info') {
            console.log(`[Player] ${msg}`);
            if (debugLogs) {
                const div = document.createElement('div');
                div.style.color = type === 'error' ? '#f44' : (type === 'warn' ? '#ff0' : '#0f0');
                div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
                debugLogs.appendChild(div);
                debugLogs.scrollTop = debugLogs.scrollHeight;
            }
        }

        function exitPlayer() {
            log("Saindo do player...");
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/';
            }
        }

        function openExternalPlayer() {
            log("Solicitando player externo...");
            const isAndroid = /Android/i.test(navigator.userAgent);
            
            if (isAndroid) {
                // Intent for Android - generic view action
                // This will trigger the "Open with" dialog on Android
                const intentUrl = `intent:${streamUrl}#Intent;action=android.intent.action.VIEW;type=video/*;end`;
                window.location.href = intentUrl;
                log("Intent Android disparado.");
            } else {
                // For PC, try to trigger a system prompt via a hidden iframe or direct link
                // Browsers are limited, but we can try to use the stream URL directly
                // which often triggers the OS "Open with" if it's a known media type
                const a = document.createElement('a');
                a.href = streamUrl;
                a.target = '_self'; // Try to stay in same page
                a.download = ''; // Some browsers show prompt with this
                
                // Fallback: try to open in a way that triggers the system
                // We'll use a hidden iframe to avoid leaving the page
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = streamUrl;
                document.body.appendChild(iframe);
                setTimeout(() => document.body.removeChild(iframe), 3000);
                
                log("Tentando disparar prompt do sistema no PC via iframe oculto.");
                alert("Solicitando ao sistema para abrir o player externo. Verifique se há algum aviso do navegador ou do sistema operacional.");
            }
        }

        let hls = null;
        let shakaPlayer = null;
        let tsPlayer = null;

        async function initPlayer() {
            if (!streamUrl) {
                log("Nenhuma URL de stream fornecida.", "error");
                showError("Nenhuma URL de stream fornecida.");
                return;
            }

            // Check for HEVC support
            const hevcSupport = (window.MediaSource && (
                MediaSource.isTypeSupported('video/mp4; codecs="hvc1.1.6.L93.B0"') || 
                MediaSource.isTypeSupported('video/mp4; codecs="hev1.1.6.L93.B0"')
            )) || (video.canPlayType('video/mp4; codecs="hvc1"') === 'probably');
            
            log(`Suporte HEVC/H.265 no navegador: ${hevcSupport ? 'SIM' : 'NÃO'}`);
            
            if (window.libde265) {
                log("Biblioteca libde265 carregada com sucesso! (Suporte a decodificação via software disponível)");
            } else {
                log("Aviso: libde265 não pôde ser carregada via CDN. O suporte a H.265 dependerá do hardware nativo.", "warn");
            }

            if (!hevcSupport) {
                log("Aviso: Este navegador pode não reproduzir canais H.265/HEVC nativamente.", "warn");
            }

            // Auto-detect engine if not specified or if it's a .ts file
            const isTS = streamUrl.toLowerCase().includes('.ts') || streamUrl.toLowerCase().includes('type=ts');
            if (isTS && currentEngine === 'hlsjs') {
                log("Detectado arquivo .TS - Alterando para engine MPEG-TS");
                currentEngine = 'mpegts';
            }

            log(`Iniciando player (${currentEngine}) para: ${streamUrl}`);
            
            // Force muted and autoplay attributes for TV compatibility
            video.muted = true;
            video.autoplay = true;
            video.setAttribute('playsinline', '');
            video.setAttribute('webkit-playsinline', '');
            
            updateVolumeUI();

            // Timeout para carregamento inicial
            const loadTimeout = setTimeout(() => {
                if (loading.style.display !== 'none') {
                    log("Timeout de carregamento atingido.", "warn");
                    showError("O sinal está demorando muito. Tente outro modo de reprodução.");
                }
            }, 25000);

            // Function to start HLS.js as fallback
            function startHlsJs() {
                log("Iniciando HLS.js...");
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    backBufferLength: 90,
                    maxBufferLength: 30,
                    manifestLoadingMaxRetry: 10,
                    levelLoadingMaxRetry: 10,
                    xhrSetup: function(xhr, url) {
                        xhr.withCredentials = false;
                    }
                });

                hls.loadSource(streamUrl);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
                    log("Manifesto HLS carregado com sucesso!");
                    clearTimeout(loadTimeout);
                    loading.style.display = 'none';
                    video.play().catch((err) => {
                        log(`Autoplay bloqueado: ${err.message}`, "warn");
                        bigPlay.style.display = 'flex';
                    });

                    if (data.levels && data.levels.length > 1) {
                        setupQualityMenu(data.levels);
                    }
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    log(`Erro HLS.js: ${data.details} (${data.type})`, data.fatal ? "error" : "warn");
                    if (data.fatal) {
                        clearTimeout(loadTimeout);
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                log("Erro de rede fatal, tentando recuperar...");
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                log("Erro de mídia fatal, tentando recuperar...");
                                hls.recoverMediaError();
                                break;
                            default:
                                showError("Erro de conexão. Tente o modo Shaka ou Nativo.");
                                hls.destroy();
                                break;
                        }
                    }
                });
            }

            if (currentEngine === 'mpegts' && mpegts.getFeatureList().mseLivePlayback) {
                log("Usando MPEG-TS Engine (Flv.js based)");
                try {
                    tsPlayer = mpegts.createPlayer({
                        type: 'mpegts',
                        isLive: true,
                        url: streamUrl,
                        cors: true
                    }, {
                        enableWorker: true,
                        lazyLoad: false
                    });
                    tsPlayer.attachMediaElement(video);
                    tsPlayer.load();
                    
                    tsPlayer.on(mpegts.Events.ERROR, (type, detail, info) => {
                        log(`Erro MPEG-TS: ${type} - ${detail}`, "error");
                        if (detail === mpegts.ErrorDetails.DECODE_ERROR) {
                            log("Erro de decodificação detectado no TS. Pode ser falta de suporte a H.265.", "error");
                        }
                        showError("Erro ao processar fluxo TS. Tente o modo Nativo.");
                    });

                    tsPlayer.on(mpegts.Events.METADATA_ARRIVED, () => {
                        log("Metadados TS recebidos!");
                        clearTimeout(loadTimeout);
                        loading.style.display = 'none';
                    });

                    video.play().catch(() => {
                        bigPlay.style.display = 'flex';
                    });
                } catch (e) {
                    log(`Erro ao iniciar MPEG-TS: ${e.message}`, "error");
                    showError("Falha ao iniciar player TS.");
                }
            } else if (currentEngine === 'hlsjs') {
                log("Detectando suporte HLS...");
                // Prioritize Native HLS for Samsung Tizen / Safari
                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    log("Usando HLS Nativo (Samsung/Safari)");
                    video.src = streamUrl;
                    video.onloadedmetadata = () => {
                        log("Metadados carregados no modo nativo");
                        clearTimeout(loadTimeout);
                        loading.style.display = 'none';
                        video.play().catch((err) => {
                            log(`Autoplay nativo bloqueado: ${err.message}`, "warn");
                            bigPlay.style.display = 'flex';
                        });
                    };
                    video.onerror = () => {
                        log("Erro no HLS Nativo, tentando fallback para HLS.js", "warn");
                        if (Hls.isSupported()) {
                            startHlsJs();
                        } else {
                            showError("Erro no modo nativo e HLS.js não suportado.");
                        }
                    };
                } else if (Hls.isSupported()) {
                    startHlsJs();
                } else {
                    showError("HLS não suportado neste navegador.");
                }
            } else if (currentEngine === 'shaka') {
                log("Usando Shaka Player (Exo-like)");
                shaka.polyfill.installAll();
                if (shaka.Player.isBrowserSupported()) {
                    shakaPlayer = new shaka.Player(video);
                    
                    // HEVC Configuration for Shaka
                    shakaPlayer.configure({
                        manifest: {
                            retryParameters: { maxAttempts: 5 }
                        },
                        streaming: {
                            rebufferingGoal: 2,
                            bufferingGoal: 10,
                            alwaysStreamText: true
                        }
                    });

                    shakaPlayer.addEventListener('error', (event) => {
                        log(`Erro Shaka: ${event.detail.code}`, "error");
                        showError("Erro no Shaka Player. Tente outro modo.");
                    });

                    try {
                        await shakaPlayer.load(streamUrl);
                        log("Stream carregado com Shaka!");
                        clearTimeout(loadTimeout);
                        loading.style.display = 'none';
                        video.play().catch(() => {
                            bigPlay.style.display = 'flex';
                        });
                    } catch (e) {
                        log(`Erro ao carregar Shaka: ${e.message}`, "error");
                        showError("Falha ao carregar stream no modo Shaka.");
                    }
                } else {
                    log("Shaka Player não suportado neste navegador", "error");
                    showError("Shaka Player não suportado.");
                }
            } else {
                // Native mode or HLS.js not supported
                log("Usando modo nativo do navegador");
                video.src = streamUrl;
                
                video.onloadedmetadata = () => {
                    log("Metadados carregados no modo nativo");
                    clearTimeout(loadTimeout);
                    loading.style.display = 'none';
                    video.play().catch((err) => {
                        log(`Autoplay nativo bloqueado: ${err.message}`, "warn");
                        bigPlay.style.display = 'flex';
                    });
                };

                video.onerror = () => {
                    const err = video.error;
                    log(`Erro no modo nativo: ${err ? err.message : 'Desconhecido'}`, "error");
                    clearTimeout(loadTimeout);
                    showError("Erro no modo nativo. O stream pode ser incompatível.");
                };
            }
        }

        function setEngine(engine) {
            const url = new URL(window.location.href);
            url.searchParams.set('engine', engine);
            window.location.href = url.toString();
        }

        function cleanup() {
            if (hls) { hls.destroy(); hls = null; }
            if (shakaPlayer) { shakaPlayer.destroy(); shakaPlayer = null; }
            if (tsPlayer) { tsPlayer.destroy(); tsPlayer.unload(); tsPlayer = null; }
        }

        function toggleEngine() {
            const newEngine = currentEngine === 'hlsjs' ? 'native' : 'hlsjs';
            setEngine(newEngine);
        }

        refreshBtn.addEventListener('click', () => {
            location.reload();
        });

        function setupQualityMenu(levels) {
            qualitySelector.style.display = 'block';
            qualityMenu.innerHTML = '';
            
            // Auto Option
            const autoBtn = document.createElement('button');
            autoBtn.innerText = 'Automático';
            autoBtn.className = 'quality-option active';
            autoBtn.onclick = () => setQuality(-1, autoBtn);
            qualityMenu.appendChild(autoBtn);

            // Sort levels by height descending
            const sortedLevels = [...levels].sort((a, b) => b.height - a.height);

            sortedLevels.forEach((level, index) => {
                const btn = document.createElement('button');
                const label = level.height ? `${level.height}p` : `Nível ${index}`;
                btn.innerText = label;
                btn.className = 'quality-option';
                // Find original index in hls.levels
                const originalIndex = levels.indexOf(level);
                btn.onclick = () => setQuality(originalIndex, btn);
                qualityMenu.appendChild(btn);
            });
        }

        function setQuality(index, btn) {
            if (hls) {
                hls.currentLevel = index;
                document.querySelectorAll('.quality-option').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                qualityMenu.style.display = 'none';
            }
        }

        qualityBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            qualityMenu.style.display = qualityMenu.style.display === 'flex' ? 'none' : 'flex';
        });

        document.addEventListener('click', () => {
            qualityMenu.style.display = 'none';
        });

        function showError(msg) {
            loading.style.display = 'none';
            errorOverlay.style.display = 'flex';
            errorText.innerText = msg;
        }

        // Controls Logic
        function togglePlay() {
            if (video.paused) {
                video.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                bigPlay.style.display = 'none';
            } else {
                video.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        playPauseBtn.addEventListener('click', togglePlay);
        bigPlay.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);

        video.addEventListener('play', () => {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
            bigPlay.style.display = 'none';
        });

        video.addEventListener('pause', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        });

        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            updateVolumeUI();
        });

        volSlider.addEventListener('input', (e) => {
            video.volume = e.target.value;
            video.muted = video.volume === 0;
            updateVolumeUI();
        });

        function updateVolumeUI() {
            if (video.muted || video.volume === 0) {
                volOn.style.display = 'none';
                volOff.style.display = 'block';
            } else {
                volOn.style.display = 'block';
                volOff.style.display = 'none';
            }
        }

        fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                wrapper.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Auto-hide controls
        let controlsTimeout;
        function showControls() {
            wrapper.classList.add('show-controls');
            clearTimeout(controlsTimeout);
            if (!video.paused) {
                controlsTimeout = setTimeout(() => {
                    wrapper.classList.remove('show-controls');
                }, 3000);
            }
        }

        document.addEventListener('mousemove', showControls);
        document.addEventListener('touchstart', showControls);

        video.addEventListener('error', () => {
            const err = video.error;
            if (err) {
                log(`ERRO DE VÍDEO DETECTADO: Código ${err.code}`, "error");
                log(`Mensagem: ${err.message}`, "error");
                
                let msg = "Erro desconhecido no vídeo.";
                switch(err.code) {
                    case 1: msg = "Reprodução abortada pelo usuário."; break;
                    case 2: msg = "Erro de rede: O sinal caiu ou o servidor bloqueou a conexão."; break;
                    case 3: 
                        msg = "ERRO DE DECODIFICAÇÃO: O navegador não conseguiu processar este vídeo. Provavelmente é H.265/HEVC e seu PC/Celular não tem o codec instalado."; 
                        log("DICA: Tente mudar o motor para 'TS' ou 'Shaka'. Se persistir, o navegador não suporta este codec.", "warn");
                        break;
                    case 4: msg = "Formato não suportado ou link quebrado."; break;
                }
                showError(msg);
            }
        });

        // Handle hardware back button / remote back button
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 27 || e.keyCode === 4 || e.key === 'Backspace' || e.key === 'Escape') {
                log("Botão voltar pressionado no hardware/controle.");
                exitPlayer();
            }
        });

        initPlayer();
    </script>
</body>
</html>
